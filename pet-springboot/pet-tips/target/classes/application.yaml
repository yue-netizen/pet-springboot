# ============================================
# 养宠贴士服务配置 (pet-tips)
# ============================================
# 端口：9009
# 功能：养宠知识分享、AI智能问答（基于向量数据库）
#
# ⚠️⚠️⚠️ 重要安全提示 ⚠️⚠️⚠️
# 本文件中的密码配置已移除默认值！
# 启动前必须设置环境变量或创建 .env 文件
# 详细配置请参考 .env.example 文件
# ============================================

server:
  port: 9009  # 服务端口

spring:
  application:
    name: pet-tips  # 服务名称（用于服务发现）
  servlet:
    multipart:
      max-file-size: 10MB  # 单个文件最大大小（安全限制）
      max-request-size: 10MB  # 请求最大大小
      enabled: true  # 启用文件上传
  cloud:
    nacos:
      discovery:
        # Nacos 注册中心地址（用于服务注册与发现）
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        enabled: true  # 启用服务注册
      config:
        # Nacos 配置中心地址（可选，用于动态配置）
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        file-extension: yaml
        enabled: false  # 默认关闭，需要时开启
  datasource:
    # MySQL 数据库连接配置
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pet}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}  # 数据库用户名（建议使用环境变量）
    password: ${DB_PASSWORD:}  # 🔒 必须配置！参考 .env.example
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource  # 使用 Druid 连接池
    druid:
      initial-size: 5  # 初始连接数
      min-idle: 5  # 最小空闲连接数
      max-active: 20  # 最大活跃连接数
      max-wait: 60000  # 获取连接超时时间（毫秒）
  data:
    redis:
      # Redis 配置（用于缓存热门贴士等）
      host: ${REDIS_HOST:localhost}  # Redis 主机地址
      port: ${REDIS_PORT:6379}  # Redis 端口
      password: ${REDIS_PASSWORD:}  # 🔒 生产环境必须设置！
  rabbitmq:
    # RabbitMQ 消息队列配置
    host: ${RABBITMQ_HOST:localhost}  # RabbitMQ 主机地址
    port: ${RABBITMQ_PORT:5672}  # RabbitMQ 端口
    username: ${RABBITMQ_USERNAME:guest}  # RabbitMQ 用户名
    password: ${RABBITMQ_PASSWORD:}  # 🔒 生产环境必须修改！
  ai:
    openai:
      # 阿里云 DashScope AI 配置（用于智能问答和向量检索）
      api-key: ${DASHSCOPE_API_KEY:}  # 🔒 必须配置！获取地址：https://dashscope.console.aliyun.com/
      base-url: https://dashscope.aliyuncs.com/compatible-mode  # API 基础 URL
      chat:
        options:
          model: qwen-max-latest  # AI 模型名称（通义千问最新版）
          temperature: 0.7  # 温度参数（0-1，越高越随机）

tips-ai:
  embedding-model: text-embedding-v3  # 文本嵌入模型（用于向量化）
  vector-store:
    enabled: true  # 启用向量数据库存储
    search-top-k: 3  # 向量检索返回的Top-K结果数
    similarity-threshold: 0.3  # 相似度阈值（低于此值的结果将被过滤）

seata:
  enabled: false  # 分布式事务框架（暂未启用）

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml  # Mapper XML 文件位置
  type-aliases-package: com.pet.tips.entity  # 实体类包路径
  configuration:
    map-underscore-to-camel-case: true  # 开启下划线转驼峰命名
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # SQL 日志输出
  global-config:
    db-config:
      logic-delete-field: deleted  # 逻辑删除字段名
      logic-delete-value: 1  # 已删除值
      logic-not-delete-value: 0  # 未删除值

logging:
  level:
    com.pet.tips: debug  # 本服务日志级别（生产环境建议改为 info 或 warn）

knife4j:
  enable: true  # 启用 Knife4j API 文档
  openapi:
    title: 养宠贴士服务API  # API 文档标题
    description: 宠物领养平台养宠贴士服务接口文档  # API 文档描述
    version: 1.0.0  # 版本号
    group:
      default:
        group-name: default  # 分组名称
        api-rule: package  # 按包路径扫描接口
        api-rule-resources:
          - com.pet.tips.controller  # Controller 包路径

aliyun:
  oss:
    enabled: false  # 🔒 默认关闭！需配置 AccessKey 后开启
    endpoint: https://oss-cn-beijing.aliyuncs.com  # OSS Endpoint
    access-key-id: ${OSS_ACCESS_KEY_ID:}  # 🔒 必须配置！
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:}  # 🔒 必须配置！
    bucket-name: your-bucket-name  # 🔒 请修改为你自己的 Bucket 名称
