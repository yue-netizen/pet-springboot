# ============================================
# 用户服务配置 (pet-user)
# ============================================
# 端口：9001
# 功能：用户注册、登录、个人信息管理、关注功能
#
# ⚠️⚠️⚠️ 重要安全提示 ⚠️⚠️⚠️
# 本文件中的密码配置已移除默认值！
# 启动前必须设置环境变量或创建 .env 文件
# 详细配置请参考 .env.example 文件
# ============================================

server:
  port: 9001  # 服务端口

spring:
  application:
    name: pet-user  # 服务名称（用于服务发现）
  cloud:
    nacos:
      discovery:
        # Nacos 注册中心地址（用于服务注册与发现）
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        enabled: true  # 启用服务注册
      config:
        # Nacos 配置中心地址（可选，用于动态配置）
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        file-extension: yaml
        enabled: false  # 默认关闭，需要时开启
  datasource:
    # MySQL 数据库连接配置
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:pet}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}  # 数据库用户名（建议使用环境变量）
    password: ${DB_PASSWORD:}  # 🔒 必须配置！参考 .env.example
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource  # 使用 Druid 连接池
    druid:
      initial-size: 5  # 初始连接数
      min-idle: 5  # 最小空闲连接数
      max-active: 20  # 最大活跃连接数
      max-wait: 60000  # 获取连接超时时间（毫秒）
  data:
    redis:
      # Redis 配置（用于缓存、Session、验证码等）
      host: ${REDIS_HOST:localhost}  # Redis 主机地址
      port: ${REDIS_PORT:6379}  # Redis 端口
      password: ${REDIS_PASSWORD:}  # 🔒 生产环境必须设置！
  rabbitmq:
    # RabbitMQ 消息队列配置（用于异步通知等）
    host: ${RABBITMQ_HOST:localhost}  # RabbitMQ 主机地址
    port: ${RABBITMQ_PORT:5672}  # RabbitMQ 端口
    username: ${RABBITMQ_USERNAME:guest}  # RabbitMQ 用户名
    password: ${RABBITMQ_PASSWORD:}  # 🔒 生产环境必须修改！

seata:
  enabled: false  # 分布式事务框架（暂未启用）

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml  # Mapper XML 文件位置
  type-aliases-package: com.pet.user.entity  # 实体类包路径
  configuration:
    map-underscore-to-camel-case: true  # 开启下划线转驼峰命名
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # SQL 日志输出

logging:
  level:
    com.pet.user: debug  # 本服务日志级别（生产环境建议改为 info 或 warn）

knife4j:
  enable: true  # 启用 Knife4j API 文档
  openapi:
    title: 用户服务API  # API 文档标题
    description: 宠物领养平台用户服务接口文档  # API 文档描述
    version: 1.0.0  # 版本号
    group:
      default:
        group-name: default  # 分组名称
        api-rule: package  # 按包路径扫描接口
        api-rule-resources:
          - com.pet.user.controller  # Controller 包路径
