server:
  port: 9004
  tomcat:
    max-http-form-post-size: 50MB
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      enabled: true

spring:
  application:
    name: pet-chat
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.100.128:8848
        enabled: true
      config:
        server-addr: 192.168.100.128:8848
        file-extension: yaml
        enabled: false
  datasource:
    url: jdbc:mysql://localhost:3306/pet?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
  data:
    redis:
      host: 192.168.100.128
      port: 6379
      password: 123321
  rabbitmq:
    host: 192.168.100.128
    port: 5672
    username: itheima
    password: 123321
  ai:
    openai:
      api-key: ${DASHSCOPE_API_KEY}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen-max-latest
          temperature: 0.7

seata:
  enabled: false

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.pet.chat.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.pet.chat: debug
    org.springframework.ai: debug

knife4j:
  enable: true
  openapi:
    title: 聊天服务API
    description: 宠物领养平台聊天服务接口文档
    version: 1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.pet.chat.controller
